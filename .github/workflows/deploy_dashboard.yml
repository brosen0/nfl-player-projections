name: Deploy Dashboard

on:
  push:
    branches: [main]
    paths:
      - '_site/**'
      - '.github/workflows/deploy_dashboard.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # _site/index.html is pre-generated locally because the database
      # (nfl_data.db) is too large for git and the ADP/draft advisor
      # data requires it.  Regenerate locally with:
      #   python scripts/generate_dashboard_html.py
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
