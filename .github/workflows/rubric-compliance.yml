name: Rubric Compliance

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  rubric-check:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: "pip"

      - name: Install minimal dependencies
        run: |
          python -m pip install --upgrade pip
          pip install \
            numpy==1.26.3 \
            pandas==2.1.4 \
            scikit-learn==1.4.0 \
            xgboost==2.0.3 \
            optuna==3.5.0 \
            scipy==1.11.4 \
            statsmodels==0.14.1 \
            joblib==1.3.2 \
            pytest==7.4.4 \
            torch --extra-index-url https://download.pytorch.org/whl/cpu

      - name: Install test dependencies
        run: pip install pytest-cov fastapi httpx

      - name: Run rubric compliance checker
        run: python scripts/check_rubric_compliance.py --json

      - name: Temporal integrity tests (Directive V7 Section 23.2)
        run: python -m pytest tests/test_leakage_guards.py tests/test_pipeline_determinism.py -v --tb=short

      - name: Coverage gate (Directive V7 Section 23.3)
        run: python -m pytest tests/ -x -q --cov=src --cov-fail-under=50 --ignore=tests/test_ml_audit.py --ignore=tests/test_ml_robustness_15_steps.py
