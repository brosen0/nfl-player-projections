<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Draft Advisor 2026</title>
<style>
/* ============================================================
   THEME VARIABLES — edit these to change the look
   ============================================================ */
:root {
  /* Backgrounds */
  --bg:            #0f1117;
  --surface:       #1e2130;
  --surface-hover: #252840;
  --border:        #2a2d3e;

  /* Text */
  --text:          #e8eaf0;
  --text-muted:    #888ba0;
  --text-dim:      #555870;

  /* Position accent colors */
  --qb:  #4f8ef7;
  --rb:  #4caf82;
  --wr:  #f7934f;
  --te:  #b06ef7;

  /* Signal colors */
  --value: #4caf82;
  --avoid: #e05252;

  /* Misc */
  --radius:     10px;
  --transition: 0.15s ease;
}

/* ============================================================
   Reset
   ============================================================ */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
  background: var(--bg);
  color: var(--text);
  font-size: 14px;
  line-height: 1.5;
  min-height: 100vh;
}

/* ============================================================
   Header
   ============================================================ */
.header {
  position: sticky;
  top: 0;
  z-index: 100;
  background: rgba(15, 17, 23, 0.92);
  backdrop-filter: blur(8px);
  -webkit-backdrop-filter: blur(8px);
  border-bottom: 1px solid var(--border);
  padding: 12px 20px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 12px;
  flex-wrap: wrap;
}
.header-title { font-size: 1rem; font-weight: 700; letter-spacing: 0.3px; }
.header-sub   { font-size: 0.7rem; color: var(--text-muted); margin-top: 1px; }

/* ============================================================
   Controls bar (pills + sort)
   ============================================================ */
.controls {
  max-width: 1200px;
  margin: 0 auto;
  padding: 14px 20px 6px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  flex-wrap: wrap;
  gap: 10px;
}

.pills { display: flex; gap: 6px; flex-wrap: wrap; }

.pill {
  padding: 6px 16px;
  border-radius: 20px;
  border: 1.5px solid var(--border);
  background: transparent;
  color: var(--text-muted);
  font-size: 0.8rem;
  font-weight: 500;
  cursor: pointer;
  transition: var(--transition);
  font-family: inherit;
}
.pill:hover  { border-color: var(--text-muted); color: var(--text); }
.pill.active { background: var(--text); color: var(--bg); border-color: var(--text); }

.sort-select {
  padding: 7px 12px;
  border: 1.5px solid var(--border);
  border-radius: 8px;
  background: var(--surface);
  color: var(--text-muted);
  font-size: 0.8rem;
  font-family: inherit;
  cursor: pointer;
  outline: none;
  transition: var(--transition);
}
.sort-select:focus { border-color: var(--text-muted); }

/* ============================================================
   Search box
   ============================================================ */
.search-box {
  padding: 8px 14px;
  border: 1.5px solid var(--border);
  border-radius: 8px;
  background: var(--surface);
  color: var(--text);
  font-size: 0.85rem;
  width: 200px;
  outline: none;
  font-family: inherit;
  transition: border-color var(--transition), width var(--transition);
}
.search-box:focus       { border-color: var(--text-muted); width: 240px; }
.search-box::placeholder { color: var(--text-dim); }

/* ============================================================
   Scarcity strip (per-position sleeper / fade counts)
   ============================================================ */
.scarcity-strip {
  max-width: 1200px;
  margin: 0 auto;
  padding: 0 20px 14px;
  display: flex;
  gap: 0;
  flex-wrap: wrap;
  align-items: center;
}
.scarcity-item {
  display: flex;
  align-items: center;
  gap: 7px;
  padding-right: 18px;
  margin-right: 18px;
  border-right: 1px solid var(--border);
  line-height: 1;
}
.scarcity-item:last-child { border-right: none; padding-right: 0; margin-right: 0; }
.scarcity-pos  { font-size: 0.72rem; font-weight: 700; color: var(--text-muted); min-width: 22px; }
.scarcity-up   { font-size: 0.72rem; font-weight: 600; color: var(--value); }
.scarcity-down { font-size: 0.72rem; font-weight: 600; color: var(--avoid); }

/* ============================================================
   Card grid
   ============================================================ */
.card-grid {
  max-width: 1200px;
  margin: 0 auto;
  padding: 0 20px 50px;
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(175px, 1fr));
  gap: 10px;
}

/* Expandable card detail panel */
.card-expand { max-height: 0; overflow: hidden; transition: max-height 0.2s ease; }
.player-card.open .card-expand { max-height: 120px; }
.card-expand-inner {
  padding-top: 8px;
  margin-top: 8px;
  border-top: 1px solid var(--border);
}
.expand-row {
  display: flex;
  justify-content: space-between;
  font-size: 0.68rem;
  color: var(--text-muted);
  margin-bottom: 3px;
}
.expand-row span:last-child { color: var(--text); font-weight: 500; }
.expand-note {
  font-size: 0.63rem;
  color: var(--text-dim);
  font-style: italic;
  margin-top: 4px;
  line-height: 1.4;
}

/* ============================================================
   Player card
   ============================================================ */
.player-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 14px;
  cursor: pointer;
  transition: transform var(--transition), border-color var(--transition);
  position: relative;
  overflow: hidden;
}
.player-card:hover {
  transform: translateY(-2px);
  border-color: #3a3d54;
}

/* Left accent bar */
.player-card::before {
  content: "";
  position: absolute;
  top: 0; left: 0;
  width: 3px; height: 100%;
  background: transparent;
}
.player-card.signal-value               { border-color: rgba(76, 175, 130, 0.35); }
.player-card.signal-value::before       { background: var(--value); }
.player-card.signal-avoid               { border-color: rgba(224, 82, 82, 0.3); }
.player-card.signal-avoid::before       { background: var(--avoid); }

.card-top {
  display: flex;
  justify-content: space-between;
  align-items: flex-start;
  margin-bottom: 8px;
}

/* Position badge */
.pos-badge {
  font-size: 0.65rem;
  font-weight: 700;
  padding: 2px 7px;
  border-radius: 4px;
  letter-spacing: 0.5px;
}
.pos-QB { background: var(--qb); color: #fff; }
.pos-RB { background: var(--rb); color: #0a1a10; }
.pos-WR { background: var(--wr); color: #1a0800; }
.pos-TE { background: var(--te); color: #fff; }

.card-rank { font-size: 0.7rem; color: var(--text-dim); font-weight: 600; }

.player-name {
  font-size: 0.95rem;
  font-weight: 700;
  line-height: 1.2;
  margin-bottom: 2px;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

.player-team {
  font-size: 0.72rem;
  color: var(--text-muted);
  margin-bottom: 10px;
  display: flex;
  align-items: center;
  gap: 5px;
}
.role-tag {
  font-size: 0.6rem;
  font-weight: 600;
  background: var(--border);
  border-radius: 3px;
  padding: 1px 5px;
  color: var(--text-muted);
}

/* compact stat grid on each card */
.card-stats {
  display: grid;
  grid-template-columns: repeat(2, minmax(0, 1fr));
  gap: 8px 6px;
  margin-bottom: 10px;
}
.stat-item      { display: flex; flex-direction: column; }
.stat-label     { font-size: 0.6rem; color: var(--text-dim); text-transform: uppercase; letter-spacing: 0.3px; }
.stat-value     { font-size: 0.88rem; font-weight: 600; margin-top: 2px; }
.stat-value.pos { color: var(--value); }
.stat-value.neg { color: var(--avoid); }
.stat-value.neu { color: var(--text-muted); }

/* Signal row at card bottom */
.signal-row {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 4px;
}
.signal-badge {
  font-size: 0.62rem;
  font-weight: 700;
  padding: 2px 8px;
  border-radius: 4px;
  letter-spacing: 0.3px;
  white-space: nowrap;
}
.signal-badge.value { background: rgba(76, 175, 130, 0.15); color: var(--value); }
.signal-badge.avoid { background: rgba(224, 82, 82, 0.15);  color: var(--avoid); }
.signal-badge.fair  { color: var(--text-dim); font-weight: 400; font-size: 0.6rem; }

/* ============================================================
   Footer
   ============================================================ */
.footer {
  text-align: center;
  padding: 24px 16px;
  color: var(--text-dim);
  font-size: 0.65rem;
  border-top: 1px solid var(--border);
}

/* ============================================================
   Empty state
   ============================================================ */
.no-results {
  grid-column: 1 / -1;
  text-align: center;
  padding: 60px 20px;
  color: var(--text-dim);
  font-size: 0.9rem;
}

/* ============================================================
   Responsive
   ============================================================ */
@media (max-width: 600px) {
  .header      { padding: 10px 14px; }
  .controls    { padding: 10px 14px 6px; }
  .scarcity-strip { padding: 0 14px 12px; }
  .card-grid   { padding: 0 14px 30px; grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); }
  .search-box  { width: 130px; }
  .search-box:focus { width: 150px; }
}

</style>
</head>

"use strict";

let posFilter = "All";
let sigFilter = "";   // "sleeper" | "fade" | ""
let sortKey   = "mr";
let searchQ   = "";

// ------------------------------------------------------------------
// Helpers
// ------------------------------------------------------------------

function getSignal(sp) {
  if (sp <= -25) return { cls: "avoid", label: "FADE" };
  if (sp >= 25)  return { cls: "value", label: "Sleeper" };
  return { cls: "fair", label: "Fair" };
}

function fmtSpread(sp) {
  return sp > 0 ? "+" + sp : String(sp);
}

// ------------------------------------------------------------------
// Data filtering + sorting
// ------------------------------------------------------------------

function filteredAndSorted() {
  let players = BOARD.slice();

  if (posFilter !== "All") {
    players = players.filter(p => p.p === posFilter);
  }

  if (sigFilter === "sleeper") players = players.filter(p => p.sp >= 25);
  if (sigFilter === "fade")    players = players.filter(p => p.sp <= -25);

  if (searchQ) {
    const q = searchQ.toLowerCase();
    players = players.filter(p =>
      p.n.toLowerCase().includes(q) ||
      p.t.toLowerCase().includes(q) ||
      (p.role  && p.role.toLowerCase().includes(q)) ||
      (p.usage && p.usage.toLowerCase().includes(q))
    );
  }

  players.sort((a, b) => {
    const va = a[sortKey], vb = b[sortKey];
    if (va == null) return  1;
    if (vb == null) return -1;
    // mr / ecr: lower rank number = better → ascending
    if (sortKey === "mr" || sortKey === "ecr") return va - vb;
    // sp / proj / vorp: higher = better → descending
    return vb - va;
  });

  return players;
}

// ------------------------------------------------------------------
// Card rendering
// ------------------------------------------------------------------

function renderCard(p) {
  const sig    = getSignal(p.sp);
  const spStr  = fmtSpread(p.sp);
  const spCls  = p.sp > 5 ? "pos" : p.sp < -5 ? "neg" : "neu";
  const cardCls = p.sp >= 25 ? "signal-value" : p.sp <= -25 ? "signal-avoid" : "";

  const roleDepthCap = { QB: 2, RB: 3, WR: 3, TE: 2 };
  const roleNum = p.role ? parseInt(p.role.replace(/\D/g, ""), 10) : 99;
  const showRole = p.role && roleNum <= (roleDepthCap[p.p] || 3);
  const roleTag  = showRole ? `<span class="role-tag">${p.role}</span>` : "";
  const usageNote = p.usage ? `<span style="font-size:0.6rem;color:var(--text-dim)">${p.usage}</span>` : "";

  const hasSplit  = p.trp > 0;
  const hasTT     = p.tt && p.tt !== "Balanced";
  const hasNote   = !!p.adj_note;
  const hasDetail = hasSplit || hasTT || hasNote;

  const expandInner = hasDetail ? `<div class="card-expand-inner">
    ${hasSplit ? `<div class="expand-row"><span>Run / Pass</span><span>${p.trp}% / ${p.tpp}%</span></div>` : ""}
    ${hasTT    ? `<div class="expand-row"><span>Scheme</span><span>${p.tt}</span></div>` : ""}
    ${hasNote  ? `<div class="expand-note">✎ ${p.adj_note}</div>` : ""}
  </div>` : "";

  return `<div class="player-card ${cardCls}" data-id="${p.id}" onclick="toggleCard(${p.id})">
  <div class="card-top">
    <span class="pos-badge pos-${p.p}">${p.p}</span>
    <span class="card-rank">#${p.mr}</span>
  </div>
  <div class="player-name" title="${p.n}">${p.n}</div>
  <div class="player-team">${p.t}${roleTag}</div>
  <div class="card-stats">
    <div class="stat-item" title="Projected full-season PPR fantasy points">
      <span class="stat-label">Season PPR</span>
      <span class="stat-value">${p.proj}</span>
    </div>
    <div class="stat-item" title="Average draft position (expert consensus rank)">
      <span class="stat-label">ADP Rank</span>
      <span class="stat-value">${p.ecr}</span>
    </div>
    <div class="stat-item" title="Points above a freely available replacement player at this position">
      <span class="stat-label">Above Repl.</span>
      <span class="stat-value">${p.vorp}</span>
    </div>
    <div class="stat-item" title="How many spots our model ranks them vs expert consensus — positive means undervalued">
      <span class="stat-label">vs Experts</span>
      <span class="stat-value ${spCls}">${spStr}</span>
    </div>
  </div>
  <div class="signal-row">
    <span class="signal-badge ${sig.cls}">${sig.label}</span>
    ${usageNote}
  </div>
  <div class="card-expand">${expandInner}</div>
</div>`;
}

// ------------------------------------------------------------------
// Section renderers
// ------------------------------------------------------------------

function renderPills() {
  const posPills = ["All", "QB", "RB", "WR", "TE"].map(pos => {
    const active = posFilter === pos && !sigFilter ? " active" : "";
    return `<button class="pill${active}" onclick="setPos('${pos}')">${pos}</button>`;
  }).join("");

  const sSel = sigFilter === "sleeper" ? " active" : "";
  const fSel = sigFilter === "fade"    ? " active" : "";

  const sigPills = `
    <button class="pill${sSel}" style="color:var(--value);border-color:rgba(76,175,130,0.4)" onclick="setSig('sleeper')">▲ Sleepers</button>
    <button class="pill${fSel}" style="color:var(--avoid);border-color:rgba(224,82,82,0.35)" onclick="setSig('fade')">▼ FADEs</button>
  `;

  return posPills + `<span style="width:1px;background:var(--border);height:20px;margin:0 4px;align-self:center"></span>` + sigPills;
}

function renderScarcity() {
  return ["QB", "RB", "WR", "TE"].map(pos => {
    const up   = BOARD.filter(p => p.p === pos && p.sp >= 25).length;
    const down = BOARD.filter(p => p.p === pos && p.sp <= -25).length;
    return `<div class="scarcity-item">
      <span class="scarcity-pos">${pos}</span>
      <span class="scarcity-up" title="${pos} sleepers">▲${up}</span>
      <span class="scarcity-down" title="${pos} fades">▼${down}</span>
    </div>`;
  }).join("");
}

function renderCards() {
  const players = filteredAndSorted();
  if (!players.length) {
    return `<div class="no-results">No players match your search.</div>`;
  }
  return players.map(renderCard).join("");
}

// ------------------------------------------------------------------
// State setters (called from template event handlers)
// ------------------------------------------------------------------

function setPos(pos) {
  posFilter = pos;
  sigFilter = "";
  document.getElementById("pills").innerHTML = renderPills();
  updateCards();
}

function setSig(sig) {
  sigFilter = sigFilter === sig ? "" : sig;
  document.getElementById("pills").innerHTML = renderPills();
  updateCards();
}

function toggleCard(id) {
  const el = document.querySelector(`[data-id="${id}"]`);
  if (el) el.classList.toggle("open");
}

function setSort(val) {
  sortKey = val;
  updateCards();
}

function setSearch(val) {
  searchQ = val;
  updateCards();
}

function updateCards() {
  const grid = document.getElementById("cardGrid");
  if (grid) grid.innerHTML = renderCards();
}

// ------------------------------------------------------------------
// Boot
// ------------------------------------------------------------------

function render() {
  document.getElementById("pills").innerHTML      = renderPills();
  document.getElementById("scarcityStrip").innerHTML = renderScarcity();
  updateCards();
}

// Route any printable keypress to the search box
document.addEventListener("keydown", function(e) {
  const tag = document.activeElement && document.activeElement.tagName;
  if (tag === "INPUT" || tag === "TEXTAREA" || e.metaKey || e.ctrlKey || e.altKey) return;
  if (e.key === "Escape") {
    searchQ = "";
    const box = document.getElementById("searchInput");
    if (box) { box.value = ""; updateCards(); }
  } else if (e.key.length === 1) {
    const box = document.getElementById("searchInput");
    if (box) box.focus();
  }
});

render();

</script>
